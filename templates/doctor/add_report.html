{% extends "base.html" %}
{% block title %}Add Test Report — MediCare{% endblock %}
{% set active = "add_report" %}

{% block content %}
<div class="max-w-2xl">

  <div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-800">Add Test Report</h1>
    <p class="text-slate-500 text-sm mt-1">Upload lab results for a patient.</p>
  </div>

  <div class="card">
    <form method="POST" class="space-y-5">

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Select Patient</label>
        <select name="patient_id" required class="inp">
          <option value="">-- Choose patient --</option>
          {% for p in patients %}
          <option value="{{ p.id }}">{{ p.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Test Name</label>
        <input class="inp" type="text" name="test_name" required
          placeholder="e.g. Complete Blood Count (CBC), ECG, MRI Brain"/>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Result</label>
        <textarea class="inp resize-none" name="result" rows="3" required
          placeholder="e.g. Hemoglobin: 13.5 g/dL, WBC: 7200/uL"></textarea>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Normal Range</label>
        <input class="inp" type="text" name="normal_range"
          placeholder="e.g. Hb: 12-17 g/dL, WBC: 4000-11000/uL"/>
      </div>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1.5">Doctor's Remarks</label>
        <textarea class="inp resize-none" name="remarks" rows="3"
          placeholder="e.g. All values within normal range. No further action needed."></textarea>
      </div>

      <div class="flex gap-3 pt-1">
        <button type="submit" class="btn px-5 py-2.5 text-sm">Submit Report</button>
        <a href="/doctor/dashboard" class="btn btn-white px-5 py-2.5 text-sm">Cancel</a>
      </div>

    </form>
  </div>

</div>
{% endblock %}
